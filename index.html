<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>🔐 Cryptolab - Suite de chiffrement</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0b1120 0%, #111827 100%);
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Fira Code', monospace;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            color: #eef2ff;
        }

        /* container principal */
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }

        /* header */
        .crypto-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.75rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid #2d3a5e;
            padding-bottom: 1rem;
        }

        h1 {
            font-weight: 600;
            font-size: 1.9rem;
            background: linear-gradient(135deg, #c0e0ff, #a78bfa);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }

        .badge {
            background: #1e2a44;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 500;
            color: #9ab3e0;
            font-family: monospace;
        }

        /* grille principale */
        .dashboard {
            display: flex;
            flex-direction: column;
            gap: 1.8rem;
        }

        /* panneau de contrôle */
        .control-panel {
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.5rem 1.8rem;
            border: 1px solid #2c3f66;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .settings {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            align-items: flex-end;
            margin-bottom: 1.5rem;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            min-width: 150px;
        }

        .field-group label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            color: #8da3d0;
        }

        select, input {
            background: #0f172f;
            border: 1px solid #2e3d60;
            padding: 0.6rem 1rem;
            border-radius: 1rem;
            color: #f0f3fa;
            font-weight: 500;
            font-family: inherit;
            transition: 0.2s;
            outline: none;
        }

        select:focus, input:focus {
            border-color: #7b8fc9;
            box-shadow: 0 0 0 2px rgba(100, 140, 210, 0.4);
        }

        .mode-switch {
            display: flex;
            gap: 0.5rem;
            background: #0a0f1e;
            padding: 0.3rem;
            border-radius: 3rem;
            border: 1px solid #28324e;
        }

        .seg {
            background: transparent;
            border: none;
            padding: 0.5rem 1.4rem;
            border-radius: 2rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: 0.2s;
            color: #b9c8ff;
        }

        .seg.is-active {
            background: #2d4f8c;
            color: white;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin-top: 1rem;
            align-items: center;
        }

        button {
            background: #1f2b46;
            border: none;
            padding: 0.55rem 1.4rem;
            border-radius: 2rem;
            font-weight: 600;
            color: #dce5ff;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: 1px solid #34446b;
        }

        button:hover {
            background: #2c3d64;
            transform: scale(0.97);
            border-color: #6080c0;
        }

        #run {
            background: #2c5f8a;
            color: white;
            border-color: #4783b0;
            box-shadow: 0 2px 6px rgba(0, 80, 120, 0.4);
        }

        .alert {
            background: #ff2e4d20;
            border-left: 5px solid #ff5c7c;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            margin-top: 1rem;
            font-size: 0.85rem;
            display: none;
            color: #ffbfbf;
        }

        .alert.is-visible {
            display: block;
        }

        .hint {
            background: #0f172f70;
            border-radius: 1rem;
            padding: 0.6rem 1rem;
            font-size: 0.75rem;
            font-family: monospace;
            margin-top: 1rem;
            color: #b4ceff;
        }

        /* zone texte */
        .text-areas {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
        }

        .card {
            flex: 1;
            background: #0f1629e6;
            border-radius: 1.5rem;
            padding: 1rem 1.2rem 1.2rem 1.2rem;
            border: 1px solid #2b385c;
            backdrop-filter: blur(2px);
        }

        .card h3 {
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 0.75rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #bdd4ff;
        }

        textarea {
            width: 100%;
            min-height: 200px;
            background: #010612;
            border: 1px solid #29375c;
            border-radius: 1.2rem;
            padding: 1rem;
            color: #eef5ff;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 0.9rem;
            resize: vertical;
            outline: none;
        }

        textarea:focus {
            border-color: #6080cf;
        }

        .copy-badge {
            background: #1b253f;
            padding: 0.2rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .copy-badge.copied {
            background: #2e7d64;
            color: white;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #5f73a1;
        }

        @media (max-width: 750px) {
            body {
                padding: 1rem;
            }
            .settings {
                flex-direction: column;
                align-items: stretch;
            }
            .mode-switch {
                align-self: flex-start;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="crypto-header">
        <h1>🔒 CRYPTOLAB <span class="badge">AES | S-DES | Vigenère | César</span></h1>
        <div style="font-size: 0.75rem;">⚡ chiffrement / déchiffrement local</div>
    </div>

    <div class="dashboard">
        <div class="control-panel">
            <div class="settings">
                <div class="field-group">
                    <label>📌 Algorithme</label>
                    <select id="algo">
                        <option value="aes">🔐 AES‑GCM (256 bits)</option>
                        <option value="cesar">🌀 César (shift)</option>
                        <option value="vigenere">🔑 Vigenère</option>
                        <option value="sdes">⚙️ S‑DES (simplifié)</option>
                    </select>
                </div>
                <div class="field-group" id="keyField">
                    <label>🗝️ Clé / mot de passe</label>
                    <input type="text" id="key" placeholder="clé secrète" autocomplete="off">
                </div>
                <div class="field-group" id="shiftField" style="display: none;">
                    <label>🔁 Décalage César (0‑25)</label>
                    <input type="number" id="shift" value="3" min="0" max="25" step="1">
                </div>
                <div class="mode-switch">
                    <button class="seg is-active" data-mode="encrypt">🔒 CHIFFRER</button>
                    <button class="seg" data-mode="decrypt">🔓 DÉCHIFFRER</button>
                </div>
            </div>
            <div class="action-buttons">
                <button id="run">🚀 EXÉCUTER</button>
                <button id="swap">🔄 ÉCHANGER</button>
                <button id="copy">📋 COPIER SORTIE</button>
            </div>
            <div id="alert" class="alert"></div>
            <div id="hint" class="hint">💡 AES-GCM : sortie Base64 avec sel+iv intégrés</div>
        </div>

        <div class="text-areas">
            <div class="card">
                <h3>📥 ENTRÉE <span style="font-size:0.65rem;">texte / Base64 (déchiffrement)</span></h3>
                <textarea id="input" placeholder="Saisissez le texte à chiffrer ou déchiffrer...&#10;Ex: Message confidentiel"></textarea>
            </div>
            <div class="card">
                <h3>📤 RÉSULTAT <span id="copyHint" class="copy-badge" style="cursor:pointer;">copier</span></h3>
                <textarea id="output" placeholder="Le résultat apparaîtra ici..." readonly></textarea>
            </div>
        </div>
        <footer>
            ⚡ AES dérive clé (PBKDF2) • S‑DES sur chaque byte • Vigenère uniquement lettres • César A‑Z/a‑z
        </footer>
    </div>
</div>

<script>
    // ************** IDENTIQUE À VOTRE app.js **************
    const el = (id) => document.getElementById(id);

    const algoSel = el("algo");
    const keyInput = el("key");
    const shiftInput = el("shift");
    const inputArea = el("input");
    const outputArea = el("output");
    const hint = el("hint");
    const alertBox = el("alert");
    const shiftField = el("shiftField");
    const keyField = el("keyField");

    const modeButtons = [...document.querySelectorAll(".seg")];
    let mode = "encrypt";

    modeButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
            modeButtons.forEach((b) => b.classList.remove("is-active"));
            btn.classList.add("is-active");
            mode = btn.dataset.mode;
            clearAlert();
            updateHint();
        });
    });

    algoSel.addEventListener("change", () => {
        clearAlert();
        updateHint();
    });

    document.getElementById("run").addEventListener("click", async () => {
        clearAlert();
        hint.textContent = "";
        try {
            const algo = algoSel.value;
            const text = inputArea.value;
            if (!text.trim()) throw new Error("Veuillez saisir un texte d'entrée.");

            let result = "";
            if (algo === "aes") {
                result = await runAES(text);
            } else if (algo === "cesar") {
                result = runCesar(text);
            } else if (algo === "vigenere") {
                result = runVigenere(text);
            } else if (algo === "sdes") {
                result = runSDES(text);
            }
            outputArea.value = result;
        } catch (err) {
            outputArea.value = "";
            showAlert(err.message || String(err));
        }
    });

    document.getElementById("swap").addEventListener("click", () => {
        const tmp = inputArea.value;
        inputArea.value = outputArea.value;
        outputArea.value = tmp;
    });

    const copyBtn = document.getElementById("copy");

    copyBtn.addEventListener("click", async () => {
        if (!outputArea.value) return;
        try {
            await navigator.clipboard.writeText(outputArea.value);
            hint.textContent = "Sortie copiée dans le presse‑papier.";
            copyBtn.classList.add("copied");
            setTimeout(() => copyBtn.classList.remove("copied"), 180);
        } catch {
            showAlert("Copie impossible. Vérifie les permissions du navigateur.");
        }
    });

    function updateHint() {
        const algo = algoSel.value;
        keyField.style.display = algo === "cesar" ? "none" : "flex";
        shiftField.style.display = algo === "cesar" ? "flex" : "none";

        if (algo === "aes") {
            hint.textContent = "AES-GCM: sortie en Base64. Format: version(1) + salt(16) + iv(12) + ciphertext.";
        } else if (algo === "cesar") {
            hint.textContent = "César: décalage entre 0 et 25. Chiffre seulement A‑Z/a‑z.";
        } else if (algo === "vigenere") {
            hint.textContent = "Vigenère: clé alphabétique (lettres uniquement).";
        } else if (algo === "sdes") {
            hint.textContent = "S‑DES: clé libre, sortie en Base64. Déchiffrement attend du Base64.";
        }
    }

    updateHint();

    function showAlert(message) {
        alertBox.textContent = message;
        alertBox.classList.add("is-visible");
    }

    function clearAlert() {
        alertBox.textContent = "";
        alertBox.classList.remove("is-visible");
    }

    // AES (WebCrypto)
    async function runAES(text) {
        const password = keyInput.value.trim();
        if (!password) throw new Error("Ajoute un mot de passe pour AES.");

        if (mode === "encrypt") {
            const salt = crypto.getRandomValues(new Uint8Array(16));
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const key = await deriveAesKey(password, salt);
            const data = new TextEncoder().encode(text);
            const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, data);

            const payload = packAesPayload(salt, iv, new Uint8Array(ct));
            return toBase64(payload);
        }

        // decrypt
        const bytes = fromBase64(text.trim(), "AES: entrée Base64 invalide.");
        const { salt, iv, ct } = unpackAesPayload(bytes);
        const key = await deriveAesKey(password, salt);
        const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
        return new TextDecoder().decode(pt);
    }

    async function deriveAesKey(password, salt) {
        const enc = new TextEncoder();
        const baseKey = await crypto.subtle.importKey(
            "raw",
            enc.encode(password),
            "PBKDF2",
            false,
            ["deriveKey"]
        );
        return crypto.subtle.deriveKey(
            {
                name: "PBKDF2",
                salt,
                iterations: 100000,
                hash: "SHA-256",
            },
            baseKey,
            { name: "AES-GCM", length: 256 },
            false,
            ["encrypt", "decrypt"]
        );
    }

    function toBase64(bytes) {
        let bin = "";
        bytes.forEach((b) => (bin += String.fromCharCode(b)));
        return btoa(bin);
    }

    function fromBase64(str, errorMessage = "Entrée Base64 invalide.") {
        try {
            const bin = atob(str);
            const out = new Uint8Array(bin.length);
            for (let i = 0; i < bin.length; i++) out[i] = bin.charCodeAt(i);
            return out;
        } catch {
            throw new Error(errorMessage);
        }
    }

    function packAesPayload(salt, iv, ct) {
        const version = 1;
        const out = new Uint8Array(1 + salt.length + iv.length + ct.length);
        out[0] = version;
        out.set(salt, 1);
        out.set(iv, 1 + salt.length);
        out.set(ct, 1 + salt.length + iv.length);
        return out;
    }

    function unpackAesPayload(bytes) {
        if (bytes.length < 1 + 16 + 12) {
            throw new Error("AES: entrée Base64 invalide (trop courte).");
        }
        const version = bytes[0];
        if (version !== 1) {
            throw new Error("AES: version de payload inconnue.");
        }
        const salt = bytes.slice(1, 17);
        const iv = bytes.slice(17, 29);
        const ct = bytes.slice(29);
        return { salt, iv, ct };
    }

    // Cesar
    function runCesar(text) {
        const shift = Number(shiftInput.value) % 26;
        const dir = mode === "encrypt" ? shift : (26 - shift) % 26;
        return text.replace(/[A-Za-z]/g, (ch) => {
            const base = ch <= "Z" ? 65 : 97;
            return String.fromCharCode(((ch.charCodeAt(0) - base + dir) % 26) + base);
        });
    }

    // Vigenere
    function runVigenere(text) {
        const key = keyInput.value.replace(/[^A-Za-z]/g, "").toLowerCase();
        if (!key) throw new Error("Vigenère: clé alphabétique requise.");
        let ki = 0;
        return text.replace(/[A-Za-z]/g, (ch) => {
            const base = ch <= "Z" ? 65 : 97;
            const k = key.charCodeAt(ki % key.length) - 97;
            ki++;
            const shift = mode === "encrypt" ? k : (26 - k) % 26;
            return String.fromCharCode(((ch.charCodeAt(0) - base + shift) % 26) + base);
        });
    }

    // S-DES (pédagogique)
    const P10 = [3, 5, 2, 7, 4, 10, 1, 9, 8, 6];
    const P8 = [6, 3, 7, 4, 8, 5, 10, 9];
    const IP = [2, 6, 3, 1, 4, 8, 5, 7];
    const IP_INV = [4, 1, 3, 5, 7, 2, 8, 6];
    const EP = [4, 1, 2, 3, 2, 3, 4, 1];
    const P4 = [2, 4, 3, 1];
    const S0 = [
        [1, 0, 3, 2],
        [3, 2, 1, 0],
        [0, 2, 1, 3],
        [3, 1, 3, 2],
    ];
    const S1 = [
        [0, 1, 2, 3],
        [2, 0, 1, 3],
        [3, 0, 1, 0],
        [2, 1, 0, 3],
    ];

    function runSDES(text) {
        const keyStr = keyInput.value.trim();
        if (!keyStr) {
            throw new Error("S‑DES: ajoute une clé.");
        }
        const keyBits = keyTo10Bits(keyStr);
        const { K1, K2 } = sdesKeygen(keyBits);

        if (mode === "encrypt") {
            const bytes = new TextEncoder().encode(text);
            const out = [];
            for (const b of bytes) {
                const enc = sdesEncryptByte(b, K1, K2);
                out.push(enc);
            }
            return toBase64(new Uint8Array(out));
        }

        const bytes = fromBase64(text.trim(), "S‑DES: entrée Base64 invalide.");
        const out = Array.from(bytes, (b) => sdesDecryptByte(b, K1, K2));
        return new TextDecoder().decode(new Uint8Array(out));
    }

    function sdesKeygen(key10) {
        const p10 = permute(key10, P10);
        let left = p10.slice(0, 5);
        let right = p10.slice(5);
        left = leftShift(left, 1);
        right = leftShift(right, 1);
        const K1 = permute(left.concat(right), P8);
        left = leftShift(left, 2);
        right = leftShift(right, 2);
        const K2 = permute(left.concat(right), P8);
        return { K1, K2 };
    }

    function sdesEncryptByte(byte, K1, K2) {
        const bits = byteToBits(byte);
        const ip = permute(bits, IP);
        const fk1 = fk(ip, K1);
        const swapped = fk1.slice(4).concat(fk1.slice(0, 4));
        const fk2 = fk(swapped, K2);
        const out = permute(fk2, IP_INV);
        return bitsToByte(out);
    }

    function sdesDecryptByte(byte, K1, K2) {
        const bits = byteToBits(byte);
        const ip = permute(bits, IP);
        const fk1 = fk(ip, K2);
        const swapped = fk1.slice(4).concat(fk1.slice(0, 4));
        const fk2 = fk(swapped, K1);
        const out = permute(fk2, IP_INV);
        return bitsToByte(out);
    }

    function fk(bits, subkey) {
        const left = bits.slice(0, 4);
        const right = bits.slice(4);
        const ep = permute(right, EP);
        const x = xor(ep, subkey);
        const s0 = sbox(x.slice(0, 4), S0);
        const s1 = sbox(x.slice(4), S1);
        const p4 = permute(s0.concat(s1), P4);
        const leftOut = xor(left, p4);
        return leftOut.concat(right);
    }

    function sbox(bits, box) {
        const row = (bits[0] << 1) | bits[3];
        const col = (bits[1] << 1) | bits[2];
        const val = box[row][col];
        return [ (val >> 1) & 1, val & 1 ];
    }

    function permute(bits, table) {
        return table.map((i) => bits[i - 1]);
    }

    function leftShift(bits, n) {
        return bits.slice(n).concat(bits.slice(0, n));
    }

    function xor(a, b) {
        return a.map((v, i) => v ^ b[i]);
    }

    function byteToBits(byte) {
        const out = [];
        for (let i = 7; i >= 0; i--) out.push((byte >> i) & 1);
        return out;
    }

    function bitsToByte(bits) {
        return bits.reduce((acc, b) => (acc << 1) | b, 0);
    }

    function keyTo10Bits(str) {
        const bytes = new TextEncoder().encode(str);
        const bits = [];
        for (const b of bytes) {
            for (let i = 7; i >= 0; i--) bits.push((b >> i) & 1);
        }
        while (bits.length < 10) bits.push(0);
        return bits.slice(0, 10);
    }

    // petit bonus: clic sur le span "copier" pour la sortie
    document.getElementById("copyHint")?.addEventListener("click", async () => {
        if (!outputArea.value) return;
        try {
            await navigator.clipboard.writeText(outputArea.value);
            hint.textContent = "Sortie copiée (via badge).";
            setTimeout(() => { if(hint.textContent === "Sortie copiée (via badge).") hint.textContent = ""; }, 1500);
        } catch(e) { showAlert("échec copie"); }
    });
</script>
</body>
</html>
